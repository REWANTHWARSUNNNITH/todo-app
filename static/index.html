<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      height: fit-content;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      color: #1a1a1a;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    input, textarea {
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus, textarea:focus { border-color: #6c63ff; }

    textarea { resize: none; height: 70px; }

    button.add-btn {
      padding: 10px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #5a52d5; }

    .todo-list { display: flex; flex-direction: column; gap: 12px; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border: 1px solid #eee;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .todo-item.completed { background: #f9f9f9; opacity: 0.7; }

    .todo-item input[type="checkbox"] {
      margin-top: 3px;
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #6c63ff;
    }

    .todo-content { flex: 1; }

    .todo-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .todo-item.completed .todo-title {
      text-decoration: line-through;
      color: #999;
    }

    .todo-desc {
      font-size: 13px;
      color: #777;
      margin-top: 2px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ff4d4d;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }

    .delete-btn:hover { color: #cc0000; }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 My Todos</h1>

    <div class="input-group">
      <input type="text" id="titleInput" placeholder="Todo title..." />
      <textarea id="descInput" placeholder="Description (optional)..."></textarea>
      <button class="add-btn" onclick="addTodo()">+ Add Todo</button>
    </div>

    <div class="todo-list" id="todoList">
      <p class="empty">Loading...</p>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000/todos";

    async function fetchTodos() {
      const res = await fetch(API);
      const todos = await res.json();
      renderTodos(todos);
    }

    function renderTodos(todos) {
      const list = document.getElementById("todoList");
      if (todos.length === 0) {
        list.innerHTML = '<p class="empty">No todos yet. Add one above!</p>';
        return;
      }
      list.innerHTML = todos.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''}">
          <input type="checkbox" ${todo.completed ? 'checked' : ''}
            onchange="toggleTodo(${todo.id}, this.checked)" />
          <div class="todo-content">
            <div class="todo-title">${todo.title}</div>
            ${todo.description ? `<div class="todo-desc">${todo.description}</div>` : ''}
          </div>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})">🗑</button>
        </div>
      `).join('');
    }

    async function addTodo() {
      const title = document.getElementById("titleInput").value.trim();
      const description = document.getElementById("descInput").value.trim();
      if (!title) return alert("Title is required!");

      await fetch(API + "/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, description })
      });

      document.getElementById("titleInput").value = "";
      document.getElementById("descInput").value = "";
      fetchTodos();
    }

    async function toggleTodo(id, completed) {
      await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ completed })
      });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/${id}`, { method: "DELETE" });
      fetchTodos();
    }

    fetchTodos();
  </script>
</body>
</html>
